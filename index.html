<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Villes à moins de 2h de Toulouse</title>
  <style>
    :root {
      --bg: #f5f6f4;
      --ink: #1d2526;
      --muted: #65706d;
      --line: #d8ded8;
      --panel: #ffffff;
      --accent: #1f7a6d;
      --accent-2: #c5462d;
      --warn: #c78116;
      --good: #2f8b57;
      --soft: #edf4f0;
      --shadow: 0 16px 36px rgba(28, 42, 39, .10);
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(31, 122, 109, .08), transparent 320px),
        var(--bg);
      color: var(--ink);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      padding: 24px;
    }

    .shell {
      max-width: 1320px;
      margin: 0 auto;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 18px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin: 0 0 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 54px);
      line-height: .98;
      letter-spacing: 0;
      max-width: 760px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-weight: 750;
      white-space: nowrap;
    }

    .btn.secondary {
      background: white;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .btn.danger {
      background: #8f3326;
    }

    .btn.icon {
      width: 40px;
      padding: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(240px, 330px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 16px;
      position: sticky;
      top: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 122, 109, .14);
    }

    .weights {
      display: grid;
      grid-template-columns: 1fr 72px;
      gap: 8px 10px;
      align-items: center;
      margin: 12px 0 18px;
    }

    input[type="range"] {
      padding: 0;
      accent-color: var(--accent);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      background: var(--soft);
      border: 1px solid #dce8e2;
      border-radius: 8px;
      padding: 12px;
      min-height: 78px;
    }

    .metric b {
      display: block;
      font-size: 24px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .add-form {
      border-top: 1px solid var(--line);
      padding-top: 16px;
      margin-top: 16px;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .table-panel {
      overflow: hidden;
    }

    .table-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.72);
    }

    .table-head strong {
      font-size: 16px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 5px;
      vertical-align: -1px;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 160px);
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      min-width: 880px;
      background: white;
    }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #fbfcfb;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #f8fbf8;
    }

    .rank {
      width: 56px;
      font-weight: 900;
      font-size: 18px;
    }

    .priority {
      width: 10px;
      min-width: 10px;
      padding: 0;
    }

    .priority div {
      width: 10px;
      min-height: 56px;
    }

    .p-hot { background: #d13f2f; }
    .p-warm { background: #e39423; }
    .p-mid { background: #d0b936; }
    .p-cool { background: #3f9b70; }

    .city {
      font-weight: 850;
      font-size: 15px;
    }

    .sub {
      color: var(--muted);
      display: block;
      font-size: 12px;
      margin-top: 2px;
    }

    .score {
      display: inline-flex;
      min-width: 52px;
      min-height: 32px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--soft);
      font-weight: 900;
    }

    .date-cell {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 220px;
    }

    .date-cell input {
      min-height: 36px;
      max-width: 150px;
    }

    .mini {
      min-height: 36px;
      width: 36px;
      border-radius: 8px;
      background: #edf1ef;
      color: var(--ink);
      font-weight: 900;
    }

    .remove {
      background: transparent;
      color: #8f3326;
      border: 1px solid #ead1cc;
    }

    .empty {
      padding: 34px 18px;
      color: var(--muted);
      text-align: center;
    }

    .file-input {
      display: none;
    }

    @media (max-width: 980px) {
      .app { padding: 14px; }
      .topbar, .grid {
        grid-template-columns: 1fr;
      }
      .toolbar {
        justify-content: flex-start;
      }
      .controls {
        position: static;
      }
      .table-wrap {
        max-height: none;
      }
    }

    @media (max-width: 560px) {
      h1 { font-size: 32px; }
      .toolbar, .two {
        grid-template-columns: 1fr;
        display: grid;
      }
      .btn, .btn.icon {
        width: 100%;
      }
      .metric-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Suivi terrain</p>
          <h1>Villes à moins de 2h de Toulouse</h1>
        </div>
        <div class="toolbar">
          <button class="btn secondary" id="exportJson" title="Exporter les données JSON">Exporter JSON</button>
          <button class="btn secondary" id="exportCsv" title="Exporter les données CSV">Exporter CSV</button>
          <button class="btn secondary" id="importBtn" title="Importer un fichier JSON">Importer</button>
          <button class="btn danger" id="resetBtn" title="Revenir aux données initiales">Réinitialiser</button>
          <input class="file-input" id="importFile" type="file" accept="application/json,.json">
        </div>
      </header>

      <section class="grid">
        <aside class="panel controls">
          <div class="metric-grid">
            <div class="metric"><b id="cityCount">0</b><span>communes</span></div>
            <div class="metric"><b id="avgAge">0 j</b><span>moy. sans passage</span></div>
          </div>

          <div class="field">
            <label for="search">Recherche</label>
            <input id="search" type="search" placeholder="Albi, 31, Tarn...">
          </div>

          <div class="two">
            <div class="field">
              <label for="departmentFilter">Département</label>
              <select id="departmentFilter"></select>
            </div>
            <div class="field">
              <label for="sortMode">Tri</label>
              <select id="sortMode">
                <option value="score">Classement</option>
                <option value="date">Plus ancien passage</option>
                <option value="population">Population</option>
                <option value="time">Temps depuis Toulouse</option>
                <option value="name">Nom</option>
              </select>
            </div>
          </div>

          <div class="weights">
            <label for="dateWeight">Poids date</label>
            <strong id="dateWeightValue">65%</strong>
            <input id="dateWeight" type="range" min="0" max="100" value="65">
            <span></span>
            <label for="populationWeight">Poids population</label>
            <strong id="populationWeightValue">35%</strong>
            <input id="populationWeight" type="range" min="0" max="100" value="35">
            <span></span>
          </div>

          <form class="add-form" id="addForm">
            <div class="field">
              <label for="newName">Commune</label>
              <input id="newName" required placeholder="Nom">
            </div>
            <div class="two">
              <div class="field">
                <label for="newDepartment">Dépt.</label>
                <input id="newDepartment" required placeholder="31">
              </div>
              <div class="field">
                <label for="newPopulation">Population</label>
                <input id="newPopulation" required type="number" min="1" step="1" placeholder="12000">
              </div>
            </div>
            <div class="two">
              <div class="field">
                <label for="newTime">Minutes</label>
                <input id="newTime" required type="number" min="1" max="180" step="1" placeholder="75">
              </div>
              <div class="field">
                <label for="newDate">Dernier passage</label>
                <input id="newDate" type="date">
              </div>
            </div>
            <button class="btn" type="submit">Ajouter</button>
          </form>
        </aside>

        <section class="panel table-panel">
          <div class="table-head">
            <strong id="resultTitle">Classement</strong>
            <div class="legend">
              <span><i class="dot p-hot"></i>Priorité forte</span>
              <span><i class="dot p-warm"></i>À planifier</span>
              <span><i class="dot p-mid"></i>À surveiller</span>
              <span><i class="dot p-cool"></i>Récent</span>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th></th>
                  <th>#</th>
                  <th>Commune</th>
                  <th>Temps</th>
                  <th>Population</th>
                  <th>Dernier passage</th>
                  <th>Jours</th>
                  <th>Score</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
            <div class="empty" id="emptyState" hidden>Aucune commune trouvée.</div>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "toulouse-2h-cities-v1";
    const todayIso = () => new Date().toISOString().slice(0, 10);
    const initialCities = [
      { name: "Toulouse", department: "31", population: 504078, minutes: 0, lastVisit: "2026-06-28" },
      { name: "Colomiers", department: "31", population: 39968, minutes: 20, lastVisit: "2026-04-12" },
      { name: "Tournefeuille", department: "31", population: 28673, minutes: 22, lastVisit: "2026-03-08" },
      { name: "Blagnac", department: "31", population: 26502, minutes: 18, lastVisit: "2026-05-20" },
      { name: "Muret", department: "31", population: 25305, minutes: 28, lastVisit: "2026-02-14" },
      { name: "Ramonville-Saint-Agne", department: "31", population: 14821, minutes: 18, lastVisit: "2026-01-22" },
      { name: "Balma", department: "31", population: 17133, minutes: 18, lastVisit: "2025-12-10" },
      { name: "Cugnaux", department: "31", population: 19195, minutes: 24, lastVisit: "2025-11-04" },
      { name: "Saint-Gaudens", department: "31", population: 11664, minutes: 75, lastVisit: "2025-09-15" },
      { name: "Villefranche-de-Lauragais", department: "31", population: 5010, minutes: 35, lastVisit: "2025-07-02" },
      { name: "Revel", department: "31", population: 9861, minutes: 58, lastVisit: "2025-05-12" },
      { name: "Montauban", department: "82", population: 62000, minutes: 50, lastVisit: "2025-10-24" },
      { name: "Moissac", department: "82", population: 13600, minutes: 62, lastVisit: "2025-04-09" },
      { name: "Castelsarrasin", department: "82", population: 14300, minutes: 55, lastVisit: "2025-08-30" },
      { name: "Albi", department: "81", population: 49094, minutes: 62, lastVisit: "2025-06-18" },
      { name: "Castres", department: "81", population: 41636, minutes: 78, lastVisit: "2025-03-16" },
      { name: "Gaillac", department: "81", population: 15700, minutes: 50, lastVisit: "2025-01-11" },
      { name: "Graulhet", department: "81", population: 12900, minutes: 58, lastVisit: "2024-12-02" },
      { name: "Mazamet", department: "81", population: 10000, minutes: 95, lastVisit: "2025-02-21" },
      { name: "Auch", department: "32", population: 22600, minutes: 72, lastVisit: "2025-05-27" },
      { name: "L'Isle-Jourdain", department: "32", population: 9600, minutes: 38, lastVisit: "2025-09-06" },
      { name: "Condom", department: "32", population: 6300, minutes: 105, lastVisit: "2024-11-19" },
      { name: "Fleurance", department: "32", population: 6100, minutes: 82, lastVisit: "2025-08-01" },
      { name: "Carcassonne", department: "11", population: 46673, minutes: 62, lastVisit: "2025-07-21" },
      { name: "Castelnaudary", department: "11", population: 12200, minutes: 42, lastVisit: "2025-12-18" },
      { name: "Limoux", department: "11", population: 10000, minutes: 84, lastVisit: "2024-10-29" },
      { name: "Narbonne", department: "11", population: 56000, minutes: 105, lastVisit: "2025-01-30" },
      { name: "Foix", department: "09", population: 9500, minutes: 74, lastVisit: "2025-06-04" },
      { name: "Pamiers", department: "09", population: 16000, minutes: 55, lastVisit: "2025-10-08" },
      { name: "Saint-Girons", department: "09", population: 6400, minutes: 90, lastVisit: "2024-09-20" },
      { name: "Tarbes", department: "65", population: 43000, minutes: 95, lastVisit: "2025-02-06" },
      { name: "Lourdes", department: "65", population: 13200, minutes: 112, lastVisit: "2024-12-27" },
      { name: "Bagnères-de-Bigorre", department: "65", population: 7100, minutes: 115, lastVisit: "2025-04-22" },
      { name: "Agen", department: "47", population: 33000, minutes: 86, lastVisit: "2025-03-03" },
      { name: "Villeneuve-sur-Lot", department: "47", population: 22000, minutes: 112, lastVisit: "2024-08-12" },
      { name: "Marmande", department: "47", population: 17500, minutes: 118, lastVisit: "2025-09-27" },
      { name: "Cahors", department: "46", population: 20000, minutes: 78, lastVisit: "2025-11-15" },
      { name: "Figeac", department: "46", population: 9800, minutes: 118, lastVisit: "2024-07-06" },
      { name: "Rodez", department: "12", population: 24300, minutes: 118, lastVisit: "2024-06-18" },
      { name: "Villefranche-de-Rouergue", department: "12", population: 11600, minutes: 105, lastVisit: "2025-01-04" },
      { name: "Millau", department: "12", population: 22000, minutes: 120, lastVisit: "2024-05-25" },
      { name: "Béziers", department: "34", population: 80000, minutes: 120, lastVisit: "2025-02-25" },
      { name: "Mende", department: "48", population: 12300, minutes: 120, lastVisit: "2024-09-02" }
    ];

    const state = {
      cities: loadCities(),
      search: "",
      department: "all",
      sortMode: "score",
      dateWeight: 65,
      populationWeight: 35
    };

    const els = {
      rows: document.querySelector("#rows"),
      emptyState: document.querySelector("#emptyState"),
      search: document.querySelector("#search"),
      departmentFilter: document.querySelector("#departmentFilter"),
      sortMode: document.querySelector("#sortMode"),
      dateWeight: document.querySelector("#dateWeight"),
      populationWeight: document.querySelector("#populationWeight"),
      dateWeightValue: document.querySelector("#dateWeightValue"),
      populationWeightValue: document.querySelector("#populationWeightValue"),
      cityCount: document.querySelector("#cityCount"),
      avgAge: document.querySelector("#avgAge"),
      resultTitle: document.querySelector("#resultTitle"),
      addForm: document.querySelector("#addForm"),
      importFile: document.querySelector("#importFile")
    };

    function loadCities() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch (error) {
        console.warn(error);
      }
      return initialCities.map((city, index) => ({ id: crypto.randomUUID ? crypto.randomUUID() : String(index), ...city }));
    }

    function saveCities() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.cities));
    }

    function daysSince(dateString) {
      if (!dateString) return 9999;
      const date = new Date(dateString + "T00:00:00");
      const now = new Date(todayIso() + "T00:00:00");
      return Math.max(0, Math.round((now - date) / 86400000));
    }

    function formatMinutes(minutes) {
      if (minutes < 60) return `${minutes} min`;
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return m ? `${h}h${String(m).padStart(2, "0")}` : `${h}h`;
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("fr-FR").format(value);
    }

    function enrichedCities() {
      const maxAge = Math.max(...state.cities.map(city => daysSince(city.lastVisit)), 1);
      const maxPop = Math.max(...state.cities.map(city => Number(city.population)), 1);
      return state.cities.map(city => {
        const age = daysSince(city.lastVisit);
        const dateScore = age / maxAge;
        const populationScore = Number(city.population) / maxPop;
        const score = Math.round(((dateScore * state.dateWeight) + (populationScore * state.populationWeight)) * 100 / (state.dateWeight + state.populationWeight));
        return { ...city, age, score };
      });
    }

    function filteredCities() {
      const query = state.search.trim().toLowerCase();
      let list = enrichedCities().filter(city => {
        const matchesDepartment = state.department === "all" || city.department === state.department;
        const haystack = `${city.name} ${city.department}`.toLowerCase();
        return matchesDepartment && (!query || haystack.includes(query));
      });

      const byName = (a, b) => a.name.localeCompare(b.name, "fr");
      const sorters = {
        score: (a, b) => b.score - a.score || b.age - a.age || b.population - a.population,
        date: (a, b) => b.age - a.age || byName(a, b),
        population: (a, b) => b.population - a.population || byName(a, b),
        time: (a, b) => a.minutes - b.minutes || byName(a, b),
        name: byName
      };
      return list.sort(sorters[state.sortMode]);
    }

    function priorityClass(score) {
      if (score >= 72) return "p-hot";
      if (score >= 48) return "p-warm";
      if (score >= 26) return "p-mid";
      return "p-cool";
    }

    function renderDepartmentFilter() {
      const selected = state.department;
      const departments = [...new Set(state.cities.map(city => city.department))].sort((a, b) => a.localeCompare(b, "fr", { numeric: true }));
      els.departmentFilter.innerHTML = `<option value="all">Tous</option>` + departments.map(dep => `<option value="${dep}">${dep}</option>`).join("");
      els.departmentFilter.value = departments.includes(selected) ? selected : "all";
      state.department = els.departmentFilter.value;
    }

    function render() {
      renderDepartmentFilter();
      const list = filteredCities();
      const avg = list.length ? Math.round(list.reduce((sum, city) => sum + city.age, 0) / list.length) : 0;
      els.cityCount.textContent = list.length;
      els.avgAge.textContent = `${avg} j`;
      els.resultTitle.textContent = `${list.length} commune${list.length > 1 ? "s" : ""}`;
      els.dateWeightValue.textContent = `${state.dateWeight}%`;
      els.populationWeightValue.textContent = `${state.populationWeight}%`;
      els.emptyState.hidden = list.length !== 0;
      els.rows.innerHTML = list.map((city, index) => `
        <tr>
          <td class="priority"><div class="${priorityClass(city.score)}"></div></td>
          <td class="rank">${index + 1}</td>
          <td>
            <span class="city">${city.name}</span>
            <span class="sub">Département ${city.department}</span>
          </td>
          <td>${formatMinutes(Number(city.minutes))}</td>
          <td>${formatNumber(Number(city.population))}</td>
          <td>
            <div class="date-cell">
              <input type="date" value="${city.lastVisit || ""}" data-action="date" data-id="${city.id}">
              <button class="mini" title="Marquer aujourd'hui" data-action="today" data-id="${city.id}">✓</button>
            </div>
          </td>
          <td>${city.age === 9999 ? "Jamais" : formatNumber(city.age)}</td>
          <td><span class="score">${city.score}</span></td>
          <td><button class="mini remove" title="Supprimer" data-action="remove" data-id="${city.id}">×</button></td>
        </tr>
      `).join("");
    }

    function syncWeights(changed) {
      if (changed === "date") {
        state.dateWeight = Number(els.dateWeight.value);
        state.populationWeight = 100 - state.dateWeight;
        els.populationWeight.value = state.populationWeight;
      } else {
        state.populationWeight = Number(els.populationWeight.value);
        state.dateWeight = 100 - state.populationWeight;
        els.dateWeight.value = state.dateWeight;
      }
      render();
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    els.search.addEventListener("input", event => {
      state.search = event.target.value;
      render();
    });

    els.departmentFilter.addEventListener("change", event => {
      state.department = event.target.value;
      render();
    });

    els.sortMode.addEventListener("change", event => {
      state.sortMode = event.target.value;
      render();
    });

    els.dateWeight.addEventListener("input", () => syncWeights("date"));
    els.populationWeight.addEventListener("input", () => syncWeights("population"));

    els.rows.addEventListener("click", event => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const city = state.cities.find(item => item.id === button.dataset.id);
      if (!city) return;
      if (button.dataset.action === "today") {
        city.lastVisit = todayIso();
        saveCities();
        render();
      }
      if (button.dataset.action === "remove") {
        state.cities = state.cities.filter(item => item.id !== city.id);
        saveCities();
        render();
      }
    });

    els.rows.addEventListener("change", event => {
      if (event.target.dataset.action !== "date") return;
      const city = state.cities.find(item => item.id === event.target.dataset.id);
      if (!city) return;
      city.lastVisit = event.target.value;
      saveCities();
      render();
    });

    els.addForm.addEventListener("submit", event => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      state.cities.push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        name: document.querySelector("#newName").value.trim(),
        department: document.querySelector("#newDepartment").value.trim(),
        population: Number(document.querySelector("#newPopulation").value),
        minutes: Number(document.querySelector("#newTime").value),
        lastVisit: document.querySelector("#newDate").value
      });
      event.currentTarget.reset();
      saveCities();
      render();
    });

    document.querySelector("#exportJson").addEventListener("click", () => {
      download("villes-toulouse-2h.json", JSON.stringify(state.cities, null, 2), "application/json");
    });

    document.querySelector("#exportCsv").addEventListener("click", () => {
      const header = ["nom", "departement", "population", "minutes_depuis_toulouse", "dernier_passage"];
      const rows = state.cities.map(city => [city.name, city.department, city.population, city.minutes, city.lastVisit]);
      const csv = [header, ...rows].map(row => row.map(value => `"${String(value ?? "").replaceAll('"', '""')}"`).join(",")).join("\n");
      download("villes-toulouse-2h.csv", csv, "text/csv;charset=utf-8");
    });

    document.querySelector("#importBtn").addEventListener("click", () => els.importFile.click());
    els.importFile.addEventListener("change", async event => {
      const file = event.target.files[0];
      if (!file) return;
      const data = JSON.parse(await file.text());
      state.cities = data.map((city, index) => ({
        id: city.id || (crypto.randomUUID ? crypto.randomUUID() : String(index)),
        name: city.name,
        department: String(city.department),
        population: Number(city.population),
        minutes: Number(city.minutes),
        lastVisit: city.lastVisit || ""
      })).filter(city => city.name && city.department && city.population > 0);
      saveCities();
      event.target.value = "";
      render();
    });

    document.querySelector("#resetBtn").addEventListener("click", () => {
      if (!confirm("Réinitialiser les données ?")) return;
      state.cities = initialCities.map((city, index) => ({ id: crypto.randomUUID ? crypto.randomUUID() : String(index), ...city }));
      saveCities();
      render();
    });

    render();
  </script>
</body>
</html>
