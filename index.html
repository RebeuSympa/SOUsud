<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aide pour RM</title>

  <!-- TON CSS INCHANGÉ -->
  <style>
    /* ====== TON CSS COMPLET ICI (inchangé) ====== */
  </style>
</head>

<body>
<main class="app">
  <div class="shell">

    <!-- ===== SCREEN MAIN ===== -->
    <div id="mainScreen" class="screen active">
      <header class="topbar">
        <div>
          <p class="eyebrow">#OneTeam</p>
          <h1>Aide pour RM</h1>
        </div>

        <div class="toolbar">
          <button class="btn secondary" id="exportJson">Export JSON</button>
          <button class="btn secondary" id="exportCsv">Export CSV</button>
          <button class="btn danger" id="resetBtn">Reset</button>
        </div>
      </header>

      <section class="grid">

        <aside class="panel controls">
          <div class="field">
            <label>Recherche</label>
            <input id="search" type="search">
          </div>

          <div class="field">
            <label>Département</label>
            <select id="departmentFilter"></select>
          </div>

          <form id="addForm" class="add-form">
            <input id="newName" placeholder="Commune" required>
            <input id="newDepartment" placeholder="Dept" required>
            <input id="newPopulation" type="number" placeholder="Population" required>
            <input id="newTime" type="number" placeholder="Minutes" required>
            <input id="newDate" type="date">
            <button class="btn">Ajouter</button>
          </form>
        </aside>

        <section class="panel table-panel">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Ville</th>
                <th>Temps</th>
                <th>Pop</th>
                <th>Dernier passage</th>
                <th>Score</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </section>

      </section>
    </div>

  </div>
</main>

<!-- SUPABASE -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://teeuganjefwegazhoubj.supabase.co",
  "TON_ANON_KEY_ICI"
);

const state = {
  cities: [],
  search: "",
  department: "all"
};

const els = {
  rows: document.querySelector("#rows"),
  search: document.querySelector("#search"),
  departmentFilter: document.querySelector("#departmentFilter"),
  addForm: document.querySelector("#addForm")
};

// =====================
// LOAD DATA
// =====================
async function loadCities() {
  const { data, error } = await supabase.from("cities").select("*");

  if (error) {
    console.error(error);
    return;
  }

  state.cities = data || [];
  render();
}

// =====================
// REALTIME
// =====================
supabase
  .channel("cities")
  .on(
    "postgres_changes",
    { event: "*", schema: "public", table: "cities" },
    () => loadCities()
  )
  .subscribe();

loadCities();

// =====================
// RENDER
// =====================
function render() {
  els.rows.innerHTML = state.cities.map((c, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${c.name}</td>
      <td>${c.minutes} min</td>
      <td>${c.population}</td>
      <td>${c.lastVisit || "-"}</td>
      <td>${computeScore(c)}</td>
      <td><button data-id="${c.id}" class="delete">×</button></td>
    </tr>
  `).join("");

  document.querySelectorAll(".delete").forEach(btn => {
    btn.onclick = async () => {
      await supabase.from("cities").delete().eq("id", btn.dataset.id);
    };
  });
}

// =====================
// SCORE SIMPLE
// =====================
function computeScore(city) {
  const age = city.lastVisit
    ? (Date.now() - new Date(city.lastVisit)) / 86400000
    : 9999;

  return Math.round(age);
}

// =====================
// ADD CITY
// =====================
els.addForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const newCity = {
    id: crypto.randomUUID(),
    name: newName.value,
    department: newDepartment.value,
    population: Number(newPopulation.value),
    minutes: Number(newTime.value),
    lastVisit: newDate.value || ""
  };

  await supabase.from("cities").insert(newCity);

  e.target.reset();
});

// =====================
// SEARCH
// =====================
els.search.addEventListener("input", e => {
  state.search = e.target.value.toLowerCase();
  render();
});

// =====================
// FILTER
// =====================
els.departmentFilter.addEventListener("change", e => {
  state.department = e.target.value;
  render();
});
</script>

</body>
</html>
