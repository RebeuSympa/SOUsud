<!doctype html>
<html lang="fr">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- AJOUTER CES DEUX LIGNES : -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aide pour RM</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  
  
  <style>
    :root {
      --bg: #f5f6f4;
      --ink: #1d2526;
      --muted: #65706d;
      --line: #d8ded8;
      --panel: #ffffff;
      --accent: #1f7a6d;
      --accent-2: #c5462d;
      --warn: #c78116;
      --good: #2f8b57;
      --soft: #edf4f0;
      --shadow: 0 16px 36px rgba(28, 42, 39, .10);
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(31, 122, 109, .08), transparent 320px),
        var(--bg);
      color: var(--ink);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      padding: 24px;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
    }

    .screen {
      display: none;
    }
    .screen.active {
      display: block;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 18px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin: 0 0 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 54px);
      line-height: .98;
      letter-spacing: 0;
      max-width: 760px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-weight: 750;
      white-space: nowrap;
    }

    .btn.secondary {
      background: white;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .btn.danger {
      background: #8f3326;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(240px, 330px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 16px;
      position: sticky;
      top: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 122, 109, .14);
    }

    .weights {
      display: grid;
      grid-template-columns: 1fr 72px;
      gap: 8px 10px;
      align-items: center;
      margin: 12px 0 18px;
    }

    input[type="range"] {
      padding: 0;
      accent-color: var(--accent);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      background: var(--soft);
      border: 1px solid #dce8e2;
      border-radius: 8px;
      padding: 12px;
      min-height: 78px;
    }

    .metric b {
      display: block;
      font-size: 24px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .add-form {
      border-top: 1px solid var(--line);
      padding-top: 16px;
      margin-top: 16px;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .table-panel {
      overflow: hidden;
    }

    .table-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.72);
    }

    .table-head strong {
      font-size: 16px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 5px;
      vertical-align: -1px;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 160px);
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      min-width: 800px;
      background: white;
    }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #fbfcfb;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #f8fbf8;
    }

    .rank {
      width: 56px;
      font-weight: 900;
      font-size: 18px;
    }

    .priority {
      width: 10px;
      min-width: 10px;
      padding: 0;
    }

    .priority div {
      width: 10px;
      min-height: 56px;
    }

    .p-hot { background: #d13f2f; }
    .p-warm { background: #e39423; }
    .p-mid { background: #d0b936; }
    .p-cool { background: #3f9b70; }

    .city {
      font-weight: 850;
      font-size: 15px;
    }

    .sub {
      color: var(--muted);
      display: block;
      font-size: 12px;
      margin-top: 2px;
    }

    .score {
      display: inline-flex;
      min-width: 52px;
      min-height: 32px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--soft);
      font-weight: 900;
    }

    .date-cell {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .date-cell input {
      min-height: 36px;
      max-width: 140px;
    }

    .mini {
      min-height: 36px;
      width: 36px;
      border-radius: 8px;
      background: #edf1ef;
      color: var(--ink);
      font-weight: 900;
    }

    .btn-link {
      background: var(--soft);
      color: var(--accent);
      border: 1px solid #dce8e2;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 700;
      border-radius: 6px;
    }
    .btn-link:hover {
      background: #dbeae2;
    }

    .remove {
      background: transparent;
      color: #8f3326;
      border: 1px solid #ead1cc;
    }

    .empty {
      padding: 34px 18px;
      color: var(--muted);
      text-align: center;
    }

    /* Styles pour l'écran de détail */
    .detail-container {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-top: 10px;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .list-box {
      background: #fbfcfb;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    .list-box h3 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .list-box.nogo-box h3 {
      color: var(--accent-2);
    }

    .list-items {
      list-style: none;
      padding: 0;
      margin: 0 0 14px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .list-items li {
      background: white;
      border: 1px solid var(--line);
      padding: 8px 12px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .delete-item {
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      font-weight: bold;
      padding: 0 4px;
    }
    .delete-item:hover {
      color: var(--accent-2);
    }

    @media (max-width: 980px) {
      .app { padding: 14px; }
      .topbar, .grid, .detail-grid { grid-template-columns: 1fr; }
      .toolbar { justify-content: flex-start; }
      .controls { position: static; }
      .table-wrap { max-height: none; }
    }

    @media (max-width: 560px) {
      h1 { font-size: 32px; }
      .toolbar, .two { grid-template-columns: 1fr; display: grid; }
      .btn, .btn.icon { width: 100%; }
      .metric-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      
      <div id="mainScreen" class="screen active">
        <header class="topbar">
          <div>
            <p class="eyebrow">#OneTeam</p>
            <h1>Aide pour RM</h1>
          </div>
          <div class="toolbar">
            <button id="toggleMapBtn" class="btn secondary">🗺️ Vue Carte</button>
          </div>
        </header>

        <div id="detailMapWrapper" style="display: none; height: 300px; margin-bottom: 24px; border-radius: 8px; overflow: hidden; border: 1px solid var(--line);">
            <div id="detailMap" style="width: 100%; height: 100%;"></div>
          </div>
          <div class="detail-grid">

        
        <div id="mapWrapper" style="display: none; height: 450px; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid var(--line); z-index: 1;">
          <div id="map" style="width: 100%; height: 100%;"></div>
        </div>

        <section class="grid">
          <aside class="panel controls">
            <div class="metric-grid">
              <div class="metric"><b id="cityCount">0</b><span>communes</span></div>
              <div class="metric"><b id="avgAge">0 j</b><span>moy. sans passage</span></div>
            </div>

            <div class="field">
              <label for="search">Recherche</label>
              <input id="search" type="search" placeholder="Albi, 31, Tarn...">
            </div>

            <div class="two">
              <div class="field">
                <label for="departmentFilter">Département</label>
                <select id="departmentFilter"></select>
              </div>
              <div class="field">
                <label for="sortMode">Tri</label>
                <select id="sortMode">
                  <option value="date">Plus ancien passage</option>
                  <option value="population">Population</option>
                  <option value="time">Temps depuis Toulouse</option>
                  <option value="name">Nom</option>
                </select>
              </div>
            </div>

            <form class="add-form" id="addForm">
              <div class="field">
                <label for="newName">Commune</label>
                <input id="newName" required placeholder="Nom">
              </div>
              <div class="two">
                <div class="field">
                  <label for="newDepartment">Dépt.</label>
                  <input id="newDepartment" required placeholder="31">
                </div>
                <div class="field">
                  <label for="newPopulation">Population</label>
                  <input id="newPopulation" required type="number" min="1" step="1" placeholder="12000">
                </div>
              </div>
              <div class="two">
                <div class="field">
                  <label for="newTime">Minutes</label>
                  <input id="newTime" required type="number" min="1" max="180" step="1" placeholder="75">
                </div>
                <div class="field">
                  <label for="newDate">Dernier passage</label>
                  <input id="newDate" type="date">
                </div>
              </div>
              <button class="btn" type="submit">Ajouter</button>
            </form>
          </aside>

          <section class="panel table-panel">
            <div class="table-head">
              <strong id="resultTitle">Classement</strong>
              <div class="legend">
                <span><i class="dot p-hot"></i>Jamais / > 1 an</span>
                <span><i class="dot p-warm"></i>6 mois - 1 an</span>
                <span><i class="dot p-mid"></i>2 - 6 mois</span>
                <span><i class="dot p-cool"></i>< 2 mois</span>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th></th>
                    <th>#</th>
                    <th>Commune</th>
                    <th>Temps</th>
                    <th>Population</th>
                    <th>Dernier passage</th>
                    <th>Jours</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="rows"></tbody>
              </table>
              <div class="empty" id="emptyState" hidden>Aucune commune trouvée.</div>
            </div>
          </section>
        </section>
      </div>

      <div id="detailScreen" class="screen">
        <div class="detail-container">
          <header class="detail-header">
            <div>
              <p class="eyebrow" id="detailDept">Département --</p>
              <h1 id="detailCityName" title="Cliquez pour trouver les villes à proximité" style="cursor: pointer; position: relative;">Nom de la Ville</h1>
              <div id="nearbyCitiesContainer" style="margin-top: 10px; font-size: 13px; color: var(--muted);"></div>
            </div>
            <button class="btn secondary" id="backToMainBtn">← Retour au tableau</button>
          </header>

          <div class="detail-grid">
            <div class="list-box">
              <h3>✓ Lieux visités (Fait)</h3>
              <ul class="list-items" id="visitedList"></ul>
              <div class="field" style="margin-bottom:0;">
                <input type="text" id="addVisitedInput" placeholder="Ajouter un lieu visité... (Appuyez sur Entrée)">
              </div>
            </div>

            <div class="list-box nogo-box">
              <h3>⚠ Zones ou Établissements No Go</h3>
              <ul class="list-items" id="nogoList"></ul>
              <div class="field" style="margin-bottom:0;">
                <input type="text" id="addNogoInput" placeholder="Ajouter un élément No Go... (Appuyez sur Entrée)">
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
    // --- CONFIGURATION SUPABASE ---
    const supabaseUrl = 'https://teeuganjefwegazhoubj.supabase.co'; 
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlZXVnYW5qZWZ3ZWdhemhvdWJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMjA4MjEsImV4cCI6MjA5ODU5NjgyMX0.bLlpaeGA39NA3FWpQrsCSo1xHjxQG1Yv_5gbEgVdWZU'; // <-- À REMPLACER PAR TA CLÉ sb_publishable...
    
    // CORRECTION : On renomme en "db" pour éviter le conflit avec le nom "supabase" importé par le CDN
    const db = window.supabase.createClient(supabaseUrl, supabaseKey);
    const todayIso = () => new Date().toISOString().slice(0, 10);

    const state = {
      cities: [],
      search: "",
      department: "all",
      sortMode: "date",
      dateWeight: 100,
      populationWeight: 0,
      currentSelectedCityId: null
    };

    const els = {
       mainScreen: document.querySelector("#mainScreen"),
      detailScreen: document.querySelector("#detailScreen"),
      rows: document.querySelector("#rows"),
      emptyState: document.querySelector("#emptyState"),
      search: document.querySelector("#search"),
      departmentFilter: document.querySelector("#departmentFilter"),
      sortMode: document.querySelector("#sortMode"),
      cityCount: document.querySelector("#cityCount"),
      avgAge: document.querySelector("#avgAge"),
      resultTitle: document.querySelector("#resultTitle"),
      addForm: document.querySelector("#addForm"),
      
      detailCityName: document.querySelector("#detailCityName"),
      detailDept: document.querySelector("#detailDept"),
      visitedList: document.querySelector("#visitedList"),
      nogoList: document.querySelector("#nogoList"),
      addVisitedInput: document.querySelector("#addVisitedInput"),
      addNogoInput: document.querySelector("#addNogoInput"),
      backToMainBtn: document.querySelector("#backToMainBtn"), // <-- LA VIRGULE EST BIEN LÀ
      toggleMapBtn: document.querySelector("#toggleMapBtn"),
      mapWrapper: document.querySelector("#mapWrapper"),
      nearbyCitiesContainer: document.querySelector("#nearbyCitiesContainer"),
      detailMapWrapper: document.querySelector("#detailMapWrapper")
    };

    // --- FONCTIONS BASE DE DONNÉES ---

    async function loadCitiesFromDB() {
      const { data, error } = await db.from('cities').select('*');
      if (error) {
        console.error("Erreur de chargement:", error);
        return [];
      }
      return data || [];
    }

    async function updateCityInDB(cityId, updates) {
      const { error } = await db.from('cities').update(updates).eq('id', cityId);
      if (error) console.error("Erreur de mise à jour:", error);
    }

    async function deleteCityFromDB(cityId) {
      const { error } = await db.from('cities').delete().eq('id', cityId);
      if (error) console.error("Erreur de suppression:", error);
    }

    async function addCityToDB(newCity) {
      const { data, error } = await db.from('cities').insert([newCity]).select();
      if (error) {
        console.error("Erreur d'ajout:", error);
        return null;
      }
      return data[0];
    }

    // --- LOGIQUE DE L'APPLICATION ---

    function daysSince(dateString) {
      if (!dateString) return 9999;
      const date = new Date(dateString + "T00:00:00");
      const now = new Date(todayIso() + "T00:00:00");
      return Math.max(0, Math.round((now - date) / 86400000));
    }

    function formatMinutes(minutes) {
      if (minutes < 60) return `${minutes} min`;
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return m ? `${h}h${String(m).padStart(2, "0")}` : `${h}h`;
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("fr-FR").format(value);
    }

    function enrichedCities() {
      const maxAge = Math.max(...state.cities.map(city => daysSince(city.lastVisit)), 1);
      const maxPop = Math.max(...state.cities.map(city => Number(city.population)), 1);
      return state.cities.map(city => {
        const age = daysSince(city.lastVisit);
        const dateScore = age / maxAge;
        const populationScore = Number(city.population) / maxPop;
        const score = Math.round(((dateScore * state.dateWeight) + (populationScore * state.populationWeight)) * 100 / (state.dateWeight + state.populationWeight));
        return { ...city, age, score };
      });
    }

    function filteredCities() {
      const query = state.search.trim().toLowerCase();
      let list = enrichedCities().filter(city => {
        const matchesDepartment = state.department === "all" || city.department === state.department;
        const visitedStr = (city.visitedPlaces || []).join(" ");
        const nogoStr = (city.noGo || []).join(" ");
        const haystack = `${city.name} ${city.department} ${visitedStr} ${nogoStr}`.toLowerCase();
        return matchesDepartment && (!query || haystack.includes(query));
      });

      const byName = (a, b) => a.name.localeCompare(b.name, "fr");
      
      // On attribue un rang à chaque catégorie (Rouge passe en premier, Vert en dernier)
      const getCategoryRank = (age) => {
        if (age === 9999 || age > 365) return 4; // Rouge
        if (age >= 183) return 3;                // Orange
        if (age >= 61) return 2;                 // Jaune
        return 1;                                // Vert
      };

      const sorters = {
        // Tri d'abord par rang de couleur, PUIS par population décroissante, PUIS par nom
        date: (a, b) => getCategoryRank(b.age) - getCategoryRank(a.age) || b.population - a.population || byName(a, b),
        population: (a, b) => b.population - a.population || byName(a, b),
        time: (a, b) => a.minutes - b.minutes || byName(a, b),
        name: byName
      };
      
      return list.sort(sorters[state.sortMode]);
    }

    function priorityClassByAge(age) {
      if (age === 9999 || age > 365) return "p-hot";
      if (age >= 183) return "p-warm";
      if (age >= 61) return "p-mid";
      return "p-cool";
    }

    function renderDepartmentFilter() {
      const selected = state.department;
      const departments = [...new Set(state.cities.map(city => city.department))].sort((a, b) => a.localeCompare(b, "fr", { numeric: true }));
      els.departmentFilter.innerHTML = `<option value="all">Tous</option>` + departments.map(dep => `<option value="${dep}">${dep}</option>`).join("");
      els.departmentFilter.value = departments.includes(selected) ? selected : "all";
      state.department = els.departmentFilter.value;
    }

    function render() {
      renderDepartmentFilter();
      const list = filteredCities();
      const avg = list.length ? Math.round(list.reduce((sum, city) => sum + city.age, 0) / list.length) : 0;
      els.cityCount.textContent = list.length;
      els.avgAge.textContent = `${avg} j`;
      els.resultTitle.textContent = `${list.length} commune${list.length > 1 ? "s" : ""}`;
      els.emptyState.hidden = list.length !== 0;
      
      els.rows.innerHTML = list.map((city, index) => {
        const countVisited = (city.visitedPlaces || []).length;
        const countNogo = (city.noGo || []).length;
        const labelContent = (countVisited || countNogo) 
          ? `${countVisited} Fait / ${countNogo} No Go` 
          : "Vide";

        return `
          <tr>
            <td class="priority"><div class="${priorityClassByAge(city.age)}"></div></td>
            <td class="rank">${index + 1}</td>
            <td>
              <span class="city">${city.name}</span>
              <span class="sub">Département ${city.department}</span>
            </td>
            <td>${formatMinutes(Number(city.minutes))}</td>
            <td>${formatNumber(Number(city.population))}</td>
            <td>
              <div class="date-cell">
                <input type="date" value="${city.lastVisit || ""}" data-action="date" data-id="${city.id}">
                <button class="mini" title="Marquer aujourd'hui" data-action="today" data-id="${city.id}">✓</button>
              </div>
            </td>
            <td>${city.age === 9999 ? "Jamais" : formatNumber(city.age)}</td>
            
            <td>
              <button class="btn-link" data-action="open-details" data-id="${city.id}">
                Détails (${labelContent}) →
              </button>
            </td>

          </tr>
        `;
      }).join("");
      if (els.mapWrapper && els.mapWrapper.style.display === "block") updateMap();
    }

    function openCityDetails(cityId) {
      const city = state.cities.find(c => c.id === cityId);
      if (!city) return;
      
      state.currentSelectedCityId = cityId;
      els.detailCityName.textContent = city.name;
      els.detailDept.textContent = `Département ${city.department}`;

      els.nearbyCitiesContainer.innerHTML = "<i>💡 Cliquez sur le nom de la ville pour voir les communes à ~30 min.</i>";
      
      renderDetailLists(city);
      
      els.mainScreen.classList.remove("active");
      els.detailScreen.classList.add("active");
    }

    function renderDetailLists(city) {
      const vp = city.visitedPlaces || [];
      const ng = city.noGo || [];

      els.visitedList.innerHTML = vp.length 
        ? vp.map((place, i) => `
            <li>
              <span>${place}</span>
              <button class="delete-item" data-list="visited" data-index="${i}">×</button>
            </li>`).join("")
        : `<li style="color: var(--muted); font-style: italic; border-style: dashed;">Aucun lieu enregistré</li>`;

      els.nogoList.innerHTML = ng.length 
        ? ng.map((item, i) => `
            <li>
              <span>${item}</span>
              <button class="delete-item" data-list="nogo" data-index="${i}">×</button>
            </li>`).join("")
        : `<li style="color: var(--muted); font-style: italic; border-style: dashed;">Aucune zone No Go</li>`;
    }

    function closeDetails() {
      state.currentSelectedCityId = null;
      els.detailScreen.classList.remove("active");
      els.mainScreen.classList.add("active");
      els.detailMapWrapper.style.display = "none"; 
      els.nearbyCitiesContainer.innerHTML = "";
      render();
    }

    // Événements basiques UI
    els.search.addEventListener("input", e => { state.search = e.target.value; render(); });
    els.departmentFilter.addEventListener("change", e => { state.department = e.target.value; render(); });
    els.sortMode.addEventListener("change", e => { state.sortMode = e.target.value; render(); });
    els.backToMainBtn.addEventListener("click", closeDetails);

    // Événements sur le tableau principal (Avec appels Supabase)
    els.rows.addEventListener("click", async event => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const cityId = target.dataset.id;
      const city = state.cities.find(item => item.id === cityId);
      if (!city) return;

      if (target.dataset.action === "open-details") {
        openCityDetails(cityId);
      }
      if (target.dataset.action === "today") {
        const today = todayIso();
        city.lastVisit = today;
        render();
        await updateCityInDB(cityId, { lastVisit: today });
      }
    });

els.rows.addEventListener("change", async event => {
  const action = event.target.dataset.action;
  if (action !== "date") return; // On bloque tout ce qui n'est pas la date
  const cityId = event.target.dataset.id;
  const city = state.cities.find(item => item.id === cityId);
  if (!city) return;
  
  const newDate = event.target.value;
  city.lastVisit = newDate;
  render();
  await updateCityInDB(cityId, { lastVisit: newDate });
});
    // Événements sur les détails (Fait / No Go)
    els.addVisitedInput.addEventListener("keydown", async event => {
      if (event.key !== "Enter" || !event.target.value.trim()) return;
      const city = state.cities.find(c => c.id === state.currentSelectedCityId);
      if (city) {
        if (!city.visitedPlaces) city.visitedPlaces = [];
        city.visitedPlaces.push(event.target.value.trim());
        event.target.value = "";
        renderDetailLists(city);
        await updateCityInDB(city.id, { visitedPlaces: city.visitedPlaces });
      }
    });

    els.addNogoInput.addEventListener("keydown", async event => {
      if (event.key !== "Enter" || !event.target.value.trim()) return;
      const city = state.cities.find(c => c.id === state.currentSelectedCityId);
      if (city) {
        if (!city.noGo) city.noGo = [];
        city.noGo.push(event.target.value.trim());
        event.target.value = "";
        renderDetailLists(city);
        await updateCityInDB(city.id, { noGo: city.noGo });
      }
    });

    document.querySelectorAll("#visitedList, #nogoList").forEach(ul => {
      ul.addEventListener("click", async event => {
        const btn = event.target.closest(".delete-item");
        if (!btn) return;
        const index = parseInt(btn.dataset.index, 10);
        const listType = btn.dataset.list;
        const city = state.cities.find(c => c.id === state.currentSelectedCityId);
        
        if (city) {
          if (listType === "visited") {
            city.visitedPlaces.splice(index, 1);
            renderDetailLists(city);
            await updateCityInDB(city.id, { visitedPlaces: city.visitedPlaces });
          }
          if (listType === "nogo") {
            city.noGo.splice(index, 1);
            renderDetailLists(city);
            await updateCityInDB(city.id, { noGo: city.noGo });
          }
        }
      });
    });

    // Formulaire d'ajout
    els.addForm.addEventListener("submit", async event => {
      event.preventDefault();
      const newCity = {
        name: document.querySelector("#newName").value.trim(),
        department: document.querySelector("#newDepartment").value.trim(),
        population: Number(document.querySelector("#newPopulation").value),
        minutes: Number(document.querySelector("#newTime").value),
        lastVisit: document.querySelector("#newDate").value || null,
        visitedPlaces: [],
        noGo: []
      };
      
      event.currentTarget.reset();
      
      const savedCity = await addCityToDB(newCity);
      if (savedCity) {
        state.cities.push(savedCity);
        render();
      }
    });

// --- RECHERCHE DE PROXIMITÉ (30 min / ~25 km) AVEC CARTE ---
    function getDistanceKm(lat1, lon1, lat2, lon2) {
      const R = 6371; 
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    let dMap = null;
    let dMarkersLayer = null;

    els.detailCityName.addEventListener("click", async () => {
      const currentCityId = state.currentSelectedCityId;
      if (!currentCityId) return;

      const currentCity = state.cities.find(c => c.id === currentCityId);
      els.nearbyCitiesContainer.innerHTML = "<i>⏳ Création de la carte en cours...</i>";
      
      // Afficher l'espace de la carte
      els.detailMapWrapper.style.display = "block";

      // Initialiser la mini-carte si elle n'existe pas encore
      if (!dMap) {
        dMap = L.map('detailMap');
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; OpenStreetMap'
        }).addTo(dMap);
        dMarkersLayer = L.layerGroup().addTo(dMap);
      }
      
      // Corrige un bug d'affichage Leaflet sur les éléments cachés
      setTimeout(() => dMap.invalidateSize(), 100);
      dMarkersLayer.clearLayers();

      const currentCoords = await getCoordinates(currentCity.name, currentCity.department);
      if (!currentCoords) {
        els.nearbyCitiesContainer.innerHTML = "<span style='color: var(--accent-2)'>Impossible de localiser cette commune.</span>";
        return;
      }

      let nearby = [];
      await Promise.all(state.cities.map(async (otherCity) => {
        if (otherCity.id === currentCity.id) return;
        const coords = await getCoordinates(otherCity.name, otherCity.department);
        if (coords) {
          const dist = getDistanceKm(currentCoords[0], currentCoords[1], coords[0], coords[1]);
          if (dist <= 25) nearby.push({ city: otherCity, distance: dist, coords: coords });
        }
      }));

      // Placer le Pins de la ville centrale (Plus grand, contour foncé)
      const currentHtml = `<div style="background-color: var(--ink); width: 18px; height: 18px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.5);"></div>`;
      const currentIcon = L.divIcon({ html: currentHtml, className: '', iconSize: [18, 18], iconAnchor: [9, 9] });
      L.marker(currentCoords, { icon: currentIcon, zIndexOffset: 1000 })
        .bindPopup(`<b>${currentCity.name}</b><br>📍 Ville sélectionnée`)
        .addTo(dMarkersLayer);

      // Limites pour le zoom automatique
      let bounds = L.latLngBounds([currentCoords]);

      // Placer les Pins des villes autour
      nearby.forEach(item => {
        const pClass = priorityClassByAge(item.city.age);
        let color = "#3f9b70"; 
        if (pClass === "p-hot") color = "#d13f2f"; 
        if (pClass === "p-warm") color = "#e39423"; 
        if (pClass === "p-mid") color = "#d0b936"; 

        const markerHtml = `<div style="background-color: ${color}; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.4);"></div>`;
        const customIcon = L.divIcon({ html: markerHtml, className: '', iconSize: [14, 14], iconAnchor: [7, 7] });

        L.marker(item.coords, { icon: customIcon })
          .bindPopup(`<b>${item.city.name}</b><br>🚗 ~${Math.round(item.distance)} km de distance`)
          .addTo(dMarkersLayer);
        
        bounds.extend(item.coords);
      });

      // Adapter le zoom de la carte pour tout voir
      if (nearby.length > 0) {
        dMap.fitBounds(bounds, { padding: [40, 40] });
        els.nearbyCitiesContainer.innerHTML = `<span style="color: var(--accent); font-weight: 800;">📍 ${nearby.length} communes à ~30 min affichées sur la carte.</span>`;
      } else {
        dMap.setView(currentCoords, 11);
        els.nearbyCitiesContainer.innerHTML = "Aucune autre commune de votre liste n'est à moins de 30 min.";
      }
    });
    
// --- GESTION DE LA CARTE ---
    let map = null;
    let markersLayer = null;
    let cityCoordinates = {}; // Cache pour ne pas re-télécharger les mêmes coordonnées
    let mapUpdateId = 0;

    async function getCoordinates(cityName, dept) {
      if (cityCoordinates[cityName]) return cityCoordinates[cityName];
      try {
        // Interroge l'API du gouvernement français
        const res = await fetch(`https://geo.api.gouv.fr/communes?nom=${encodeURIComponent(cityName)}&codeDepartement=${dept}&fields=centre&format=json&geometry=centre`);
        const data = await res.json();
        if (data && data.length > 0 && data[0].centre) {
          const coords = [data[0].centre.coordinates[1], data[0].centre.coordinates[0]];
          cityCoordinates[cityName] = coords;
          return coords;
        }
      } catch (e) { console.error("Erreur géolocalisation pour", cityName); }
      return null;
    }

    async function updateMap() {
      if (!map) {
        // Initialisation de la carte, centrée sur Toulouse/Occitanie
        map = L.map('map').setView([43.6047, 1.4442], 8);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        markersLayer = L.layerGroup().addTo(map);
      }
      
      const currentUpdateId = ++mapUpdateId; // Sécurité si on tape trop vite dans la recherche
      markersLayer.clearLayers();
      const list = filteredCities(); 

      for (const city of list) {
        if (currentUpdateId !== mapUpdateId) return; // Annule si une nouvelle recherche a été lancée
        
        const coords = await getCoordinates(city.name, city.department);
        if (coords) {
          // Attribuer la bonne couleur selon l'âge du dernier passage
          const pClass = priorityClassByAge(city.age);
          let color = "#3f9b70"; // Vert par défaut
          if (pClass === "p-hot") color = "#d13f2f"; // Rouge
          if (pClass === "p-warm") color = "#e39423"; // Orange
          if (pClass === "p-mid") color = "#d0b936"; // Jaune

          // Création du pins visuel
          const markerHtml = `<div style="background-color: ${color}; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.4);"></div>`;
          const customIcon = L.divIcon({ html: markerHtml, className: '', iconSize: [14, 14], iconAnchor: [7, 7] });

          L.marker(coords, { icon: customIcon })
            .bindPopup(`<b>${city.name}</b> (${city.department})<br>Dernier passage : ${city.age === 9999 ? "Jamais" : city.age + " jours"}`)
            .addTo(markersLayer);
        }
      }
    }

    // Gérer l'ouverture/fermeture de la carte
    els.toggleMapBtn.addEventListener("click", () => {
      const isHidden = els.mapWrapper.style.display === "none";
      els.mapWrapper.style.display = isHidden ? "block" : "none";
      if (isHidden) {
        if (!map) updateMap();
        else {
          updateMap();
          setTimeout(() => map.invalidateSize(), 100); // Corrige un bug Leaflet
        }
      }
    });

    // INITIALISATION : On charge les données de Supabase au démarrage
    async function initApp() {
      els.rows.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px;">Chargement depuis Supabase...</td></tr>';
      state.cities = await loadCitiesFromDB();
      
      if (state.cities.length === 0) {
          els.rows.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px;">La base de données est vide.</td></tr>';
      } else {
          render();
      }
    }

    initApp();
  </script>
</body>
</html>
